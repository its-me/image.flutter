workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[a-z0-9]+([._-][a-z0-9]+)*$/'
      when: always
    - when: never

create-latest-flutter-image:
  image: quay.io/buildah/stable:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/'
      when: always
    - when: never
  script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - buildah build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG .
    - buildah push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - buildah tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $CI_REGISTRY_IMAGE:latest
    - buildah push $CI_REGISTRY_IMAGE:latest

create-flutter-image:
  image: quay.io/buildah/stable:latest
  rules:
    - if: '$CI_COMMIT_TAG !~ /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/'
      when: always
    - when: never
  script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - buildah build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG .
    - buildah push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
